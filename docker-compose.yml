version: "3.9"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: idp_user
      POSTGRES_PASSWORD: idp_password
      POSTGRES_DB: idp_db
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U idp_user"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    env_file: .env
    # These override whatever DATABASE_URL/REDIS_URL are set to in .env.
    # Inside a container, "localhost" means the container itself — not
    # the postgres/redis containers — so we must point at the service
    # names Docker Compose registers on the shared network instead.
    # This lets .env stay localhost-based for local (non-Docker) runs
    # without needing to edit it every time you switch modes.
    environment:
      DATABASE_URL: postgresql://idp_user:idp_password@postgres:5432/idp_db
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    volumes:
      - .:/code
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  worker:
    build: .
    command: celery -A app.celery_app.celery_app worker --loglevel=info --concurrency=4
    env_file: .env
    environment:
      DATABASE_URL: postgresql://idp_user:idp_password@postgres:5432/idp_db
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    volumes:
      - .:/code
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  flower:
    build: .
    command: celery -A app.celery_app.celery_app flower --port=5555
    env_file: .env
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    ports:
      - "5555:5555"
    depends_on:
      - worker

volumes:
  pg_data:
