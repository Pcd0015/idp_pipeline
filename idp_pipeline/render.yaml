# Render's free plan (as of the 2026 pricing update) only includes Web
# Services, Postgres, and Key Value (Redis) — Background Workers require
# a paid plan. So this deploys as ONE web service that both accepts
# uploads and processes them in-process via FastAPI BackgroundTasks
# (USE_CELERY=false — see app/tasks.py and app/main.py).
#
# If you later upgrade to a paid Render plan and want the original
# API + separate-worker + Redis architecture back, set USE_CELERY=true,
# add a `type: worker` service running
# `celery -A app.celery_app.celery_app worker --loglevel=info`, and a
# `type: redis` service, then point REDIS_URL/CELERY_BROKER_URL/
# CELERY_RESULT_BACKEND at it.

services:
  - type: web
    name: idp-api
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false      # paste your Neon connection string in the Render dashboard
      - key: GEMINI_API_KEY
        sync: false      # paste your Gemini key in the Render dashboard
      - key: ADMIN_API_KEY
        generateValue: true
      - key: USE_CELERY
        value: "false"
      - key: STORAGE_BACKEND
        value: b2
      - key: B2_ENDPOINT_URL
        sync: false
      - key: B2_KEY_ID
        sync: false
      - key: B2_APPLICATION_KEY
        sync: false
      - key: B2_BUCKET_NAME
        sync: false
      - key: LLM_MODEL
        value: gemini-2.5-flash
      - key: OCR_PROVIDER
        value: tesseract
      - key: CONFIDENCE_THRESHOLD
        value: "0.80"
      - key: MAX_FILE_SIZE_MB
        value: "20"
      - key: LOG_LEVEL
        value: INFO
      - key: ALLOWED_ORIGINS
        value: "*"
      - key: RATE_LIMIT_UPLOADS
        value: "5/hour"
